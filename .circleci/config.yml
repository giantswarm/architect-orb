version: 2.1

orbs:
  architect: giantswarm/architect@9.3.0
  orb-tools: circleci/orb-tools@12.4.0

workflows:
  catalog_build:
    jobs:
      - architect/changelog-lint

      - orb-tools/lint:
          filters:
            tags:
              only: /.*/

      - orb-tools/pack:
          requires:
            - "orb-tools/lint"
          filters:
            tags:
              only: /.*/

      - orb-tools/publish:
          name: publish-branch
          orb_name: giantswarm/architect
          vcs_type: github
          enable_pr_comment: false
          circleci_token: CIRCLECI_DEV_API_TOKEN
          # Tags are expanded with `circleci env subst`; dev:${CIRCLE_BRANCH}
          # gives a stable per-branch reference for testing in consuming repos.
          dev_tags: dev:${CIRCLE_SHA1},dev:alpha,dev:${CIRCLE_BRANCH}
          requires:
            - "orb-tools/pack"
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/

      - orb-tools/publish:
          name: publish-tag
          orb_name: giantswarm/architect
          vcs_type: github
          enable_pr_comment: false
          circleci_token: CIRCLECI_DEV_API_TOKEN
          pub_type: production
          requires:
            - "orb-tools/pack"
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v\d+\.\d+\.\d+$/
