---
parameters:
  chart:
    type: string
steps:
  - run:
      name: "Stamp chart version from gitsemver"
      command: |
        VERSION=$(gitsemver version | tr -d "\n")
        sed -i "s/^version:.*$/version: ${VERSION}/" ./helm/<<parameters.chart>>/Chart.yaml
        sed -i "s/^appVersion:.*$/appVersion: ${VERSION}/" ./helm/<<parameters.chart>>/Chart.yaml
