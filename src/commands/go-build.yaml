# Command: go-build
#
# Builds Go binaries for one or more target architectures and persists them to the workspace.
# Each binary is named `<binary>-<GOOS>-<GOARCH>`. For linux/amd64 a copy is also written to
# `<binary>` for backward compatibility.
#
# All listed targets are built in this single job (no matrix needed) and the list is written
# to `.platforms` in the workspace so downstream `push-to-registries` jobs can auto-derive
# `--platform`.
#
# Parameters:
#   binary: Name of the binary to produce.
#   architectures: Comma-separated list of target architectures (e.g.,
#       "linux/amd64,linux/arm64,darwin/amd64"). Default: linux/amd64.
#   path: Path to the Go package to build (default: ".").
#   pre_test_target: Makefile target to run before tests/lints (optional).
#   tags: Additional Go build tags (optional).
#   test_target: Makefile target to run for tests (optional).

parameters:
  binary:
    type: "string"
  path:
    default: "."
    type: "string"
    description: |
      The path where the Go package to build is located.
  pre_test_target:
    default: ""
    description: |
      Executes the requested Makefile target before lints and tests. Helpful to generate code in advance.
    type: string
  tags:
    default: ""
    type: "string"
  test_target:
    default: ""
    description: |
      Executes the requested Makefile target.
    type: string
  architectures:
    default: "linux/amd64"
    description: |
      Comma-separated list of target architectures to build in this job (e.g.,
      "linux/amd64,linux/arm64"). The resolved list is written to `.platforms` in the
      workspace for downstream auto-discovery in `push-to-registries`.
    type: string
steps:
  - go-test:
      path: <<parameters.path>>
      pre_test_target: <<parameters.pre_test_target>>
      test_target: <<parameters.test_target>>
  - run:
      name: Build binaries
      command: |
        LD_FLAGS="-s -w"
        if [ -f .ldflags ]; then
          LD_FLAGS="$(cat .ldflags)"
        fi

        build_one() {
          local arch="$1"
          local goos="${arch%%/*}"
          local goarch="${arch##*/}"
          local binary_name="<<parameters.binary>>-${goos}-${goarch}"

          echo "Building ${binary_name}..."
          CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -ldflags "$LD_FLAGS" -tags "<<parameters.tags>>" -o "$binary_name" "<<parameters.path>>"

          # If linux/amd64, also create/copy to <<parameters.binary>>
          if [[ "$goos" == "linux" && "$goarch" == "amd64" ]]; then
            cp "$binary_name" "<<parameters.binary>>"
          fi
        }

        : > .platforms
        architectures="<<parameters.architectures>>"
        if [[ -z "$architectures" ]]; then
          echo "ERROR: 'architectures' must be a non-empty comma-separated list of GOOS/GOARCH pairs (e.g., linux/amd64,linux/arm64)."
          exit 1
        fi
        if [[ ! "$architectures" =~ ^[a-zA-Z0-9/_,-]+$ ]]; then
          echo "ERROR: 'architectures' must match ^[a-zA-Z0-9/_,-]+\$ (got: $architectures)."
          exit 1
        fi
        # Replace commas with spaces; bash word-splitting handles the rest.
        for raw in ${architectures//,/ }; do
          arch="$(echo "$raw" | tr -d '[:space:]')"
          [[ -z "$arch" ]] && continue
          build_one "$arch"
          echo "$arch" >> .platforms
        done
