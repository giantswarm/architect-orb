# Command: go-build
#
# Builds Go binaries for one or more target architectures and persists them to the workspace.
# Each binary is named `<binary>-<GOOS>-<GOARCH>`. For linux/amd64 a copy is also written to
# `<binary>` for backward compatibility.
#
# All listed targets are built in this single job (no matrix needed) and the list is written
# to `.platforms` in the workspace so downstream `push-to-registries` jobs can auto-derive
# `--platform`.
#
# Parameters:
#   binary: Name of the binary to produce.
#   architectures: Comma-separated list of target architectures (e.g.,
#       "linux/amd64,linux/arm64,darwin/amd64"). Default: linux/amd64.
#   path: Path to the Go package to build (default: ".").
#   pre_test_target: Makefile target to run before tests/lints (optional).
#   tags: Additional Go build tags (optional).
#   test_target: Makefile target to run for tests (optional).

parameters:
  binary:
    type: "string"
  path:
    default: "."
    type: "string"
    description: |
      The path where the Go package to build is located.
  pre_test_target:
    default: ""
    description: |
      Executes the requested Makefile target before lints and tests. Helpful to generate code in advance.
    type: string
  tags:
    default: ""
    type: "string"
  test_target:
    default: ""
    description: |
      Executes the requested Makefile target.
    type: string
  architectures:
    default: "linux/amd64"
    description: |
      Comma-separated list of target architectures to build in this job (e.g.,
      "linux/amd64,linux/arm64"). The resolved list is written to `.platforms` in the
      workspace for downstream auto-discovery in `push-to-registries`.
    type: string
  sign:
    description: |
      Sign each produced binary with cosign keyless OIDC, emitting a sibling
      `<binary>-<GOOS>-<GOARCH>.bundle` file (Sigstore bundle). Public repos only —
      private repos are skipped at runtime to avoid leaking artifacts/timestamps into
      the public Rekor transparency log.
    type: boolean
    default: true
steps:
  - go-test:
      path: <<parameters.path>>
      pre_test_target: <<parameters.pre_test_target>>
      test_target: <<parameters.test_target>>
  - run:
      name: Build binaries
      command: |
        LD_FLAGS="-s -w"
        if [ -f .ldflags ]; then
          LD_FLAGS="$(cat .ldflags)"
        fi

        build_one() {
          local arch="$1"
          local goos="${arch%%/*}"
          local goarch="${arch##*/}"
          local binary_name="<<parameters.binary>>-${goos}-${goarch}"

          echo "Building ${binary_name}..."
          CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -ldflags "$LD_FLAGS" -tags "<<parameters.tags>>" -o "$binary_name" "<<parameters.path>>"

          # If linux/amd64, also create/copy to <<parameters.binary>>
          if [[ "$goos" == "linux" && "$goarch" == "amd64" ]]; then
            cp "$binary_name" "<<parameters.binary>>"
          fi
        }

        : > .platforms
        architectures="<<parameters.architectures>>"
        if [[ -z "$architectures" ]]; then
          echo "ERROR: 'architectures' must be a non-empty comma-separated list of GOOS/GOARCH pairs (e.g., linux/amd64,linux/arm64)."
          exit 1
        fi
        if [[ ! "$architectures" =~ ^[a-zA-Z0-9/_,-]+$ ]]; then
          echo "ERROR: 'architectures' must match ^[a-zA-Z0-9/_,-]+\$ (got: $architectures)."
          exit 1
        fi
        # Replace commas with spaces; bash word-splitting handles the rest.
        for raw in ${architectures//,/ }; do
          arch="$(echo "$raw" | tr -d '[:space:]')"
          [[ -z "$arch" ]] && continue
          build_one "$arch"
          echo "$arch" >> .platforms
        done
  - when:
      condition: <<parameters.sign>>
      steps:
        - generate-github-token
        - run:
            name: Resolve repo visibility for binary signing
            command: |
              set -euo pipefail
              # Only sign binaries when the repo is public — signing private artifacts
              # in public Sigstore would leak filenames/timestamps into the public Rekor
              # transparency log.
              if [[ -z "${GITHUB_TOKEN:-}" ]]; then
                echo "ERROR: GITHUB_TOKEN is not set. Did generate-github-token succeed?" >&2
                exit 1
              fi
              GITHUB_API_URL="https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"
              HTTP_STATUS=$(curl -s -o /tmp/.gh_response_binsign -w "%{http_code}" \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "${GITHUB_API_URL}")
              if [[ "${HTTP_STATUS}" != "200" ]]; then
                echo "GitHub API call to ${GITHUB_API_URL} failed (HTTP ${HTTP_STATUS}):"
                cat /tmp/.gh_response_binsign
                exit 1
              fi
              REPO_PRIVATE=$(jq -r '.private' < /tmp/.gh_response_binsign)
              if [[ "${REPO_PRIVATE}" == "false" ]]; then
                echo "public" > /tmp/.binary_sign_access
              else
                echo "private" > /tmp/.binary_sign_access
              fi
              echo "Repo visibility: ${REPO_PRIVATE} (private=$REPO_PRIVATE) → $(cat /tmp/.binary_sign_access)"
        - cosign-prepare
        - run:
            name: Sign binaries with cosign keyless OIDC
            command: |
              set -euo pipefail
              access=$(cat /tmp/.binary_sign_access)
              if [[ "$access" != "public" ]]; then
                echo "Repo is not public; skipping binary signing."
                exit 0
              fi

              shopt -s nullglob
              binaries=( "<<parameters.binary>>"-*-* )
              # Don't re-sign existing .bundle files if the glob picks them up.
              filtered=()
              for f in "${binaries[@]}"; do
                [[ "$f" == *.bundle ]] && continue
                filtered+=("$f")
              done
              if [[ ${#filtered[@]} -eq 0 ]]; then
                echo "No binaries found matching <<parameters.binary>>-*-*; nothing to sign."
                exit 0
              fi

              for bin in "${filtered[@]}"; do
                bundle="${bin}.bundle"
                echo "cosign sign-blob $bin → $bundle"
                cosign sign-blob --yes --bundle "$bundle" "$bin"

                echo "cosign verify-blob $bin"
                cosign verify-blob \
                  --bundle "$bundle" \
                  --certificate-oidc-issuer-regexp '^https://oidc\.circleci\.com' \
                  --certificate-identity-regexp '^https://circleci\.com/api/v2/projects/[a-f0-9-]+/pipeline-definitions/[a-f0-9-]+$' \
                  "$bin" > /dev/null
              done
