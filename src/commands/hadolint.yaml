description: |
  Lint a Dockerfile with hadolint. Shared by `push-to-registries` and
  `build-image` so the lint behaviour cannot drift between the two jobs.
parameters:
  mode:
    description: |
      - "warn" (default): run hadolint, print findings, never fail the job.
      - "fail": run hadolint and fail the job on any finding.
      - "skip": don't run hadolint at all.
    type: enum
    enum: ["warn", "fail", "skip"]
    default: "warn"
  dockerfile:
    type: string
    default: "./Dockerfile"
  config:
    description: |
      Optional path to a `.hadolint.yaml` configuration file. When empty,
      hadolint uses its built-in defaults.
    type: string
    default: ""
steps:
  - unless:
      condition:
        equal: ["<<parameters.mode>>", "skip"]
      steps:
        - run:
            name: "architect/hadolint: Lint <<parameters.dockerfile>>"
            command: |
              set -uo pipefail
              if ! command -v hadolint >/dev/null 2>&1; then
                echo "hadolint not found on PATH; the architect image should provide it." >&2
                if [[ "<<parameters.mode>>" == "fail" ]]; then exit 1; fi
                exit 0
              fi
              args=()
              if [[ -n "<<parameters.config>>" ]]; then
                args+=("--config" "<<parameters.config>>")
              fi
              if hadolint "${args[@]}" "<<parameters.dockerfile>>"; then
                echo "hadolint: no findings."
                exit 0
              fi
              rc=$?
              if [[ "<<parameters.mode>>" == "fail" ]]; then
                exit "$rc"
              fi
              echo "hadolint reported findings (mode=warn); continuing build."
