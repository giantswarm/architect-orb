parameters:
  tag-suffix:
    type: "string"
    default: ""
steps:
  - run:
      name: Generate container tag from 'architect project version' and tag-suffix parameter
      command: |
        architect project version | head -n 1 | tr -d "\n" | tee /tmp/.docker_image_tag
        echo -n "<<parameters.tag-suffix>>" | tee -a /tmp/.docker_image_tag
        echo 'export DOCKER_IMAGE_TAG=$(cat /tmp/.docker_image_tag)' >> $BASH_ENV
