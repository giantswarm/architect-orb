# Command: cosign-sign-verify
#
# Mints a sigstore-audience OIDC token via `circleci run oidc get` and signs +
# verifies one or more artifacts with cosign keyless OIDC. Supports OCI
# references (image / chart), blob files (Go binaries), and signed SBOM/in-toto
# attestations under a single command so the CircleCI OIDC issuer/identity regex
# pair stays in one place.
#
# Inputs are read from a file rather than passed as parameters because callers
# produce them inside a runtime shell loop (per-registry refs from the image
# push, per-architecture binaries from go-build) and orb commands cannot be
# invoked from within a shell loop.
#
# File format:
#   kind=oci    — one OCI reference per line, e.g. `gsoci.azurecr.io/charts/giantswarm/cert-exporter@sha256:…`
#   kind=blob   — one `<file> <bundle-path>` pair per line, e.g. `mybin-linux-amd64 mybin-linux-amd64.bundle`
#   kind=attest — one `<ref> <type> <predicate-file>` triple per line, e.g.
#                 `gsoci.azurecr.io/giantswarm/myapp@sha256:… spdxjson /tmp/sbom.spdx.json`
#                 (signs the predicate as a cosign DSSE attestation referrer on <ref>).
# Blank lines and lines starting with `#` are ignored. If the file does not
# exist or is empty, the step exits 0 without doing anything (so callers that
# decide at runtime to skip signing — e.g. private artifacts — can do so by
# truncating the file).

parameters:
  kind:
    description: |
      Which cosign subcommand pair to invoke.
      `oci`    → `cosign sign` / `cosign verify` on OCI references.
      `blob`   → `cosign sign-blob --bundle` / `cosign verify-blob --bundle` on files.
      `attest` → `cosign attest --predicate --type` / `cosign verify-attestation --type`
                 on OCI references (signed SBOM / in-toto attestations).
    type: enum
    enum: [oci, blob, attest]
    default: oci
  refs_file:
    description: |
      Path to a file containing one entry per line. See the command header for the
      per-kind format. Defaults to `/tmp/.cosign_refs` for `oci`;
      `/tmp/.cosign_blobs` (blob) and `/tmp/.cosign_attest` (attest) are the
      conventional choices for the other kinds (set explicitly).
    type: string
    default: /tmp/.cosign_refs
steps:
  - run:
      name: Cosign sign + verify (<<parameters.kind>>)
      command: |
        set -euo pipefail

        refs_file="<<parameters.refs_file>>"
        if [[ ! -s "$refs_file" ]]; then
          echo "No entries in $refs_file; nothing to sign."
          exit 0
        fi

        cosign version

        # Fulcio's CircleCI federation expects an OIDC token with aud=sigstore.
        # The auto-injected CIRCLE_OIDC_TOKEN_V2 has a different audience and
        # gets rejected with HTTP 400. Mint a fresh sigstore-audience token via
        # the circleci CLI; cosign reads SIGSTORE_ID_TOKEN automatically.
        SIGSTORE_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "sigstore"}' --root-issuer)
        export SIGSTORE_ID_TOKEN

        ISSUER_REGEX='^https://oidc\.circleci\.com'
        IDENTITY_REGEX='^https://circleci\.com/api/v2/projects/[a-f0-9-]+/pipeline-definitions/[a-f0-9-]+$'

        # Rekor duplicate-entry rejection (HTTP 409). Matched with `grep -E`.
        # The structured token (createLogEntryConflict) appears in sign-blob
        # errors; the prose is all the `oci`/`attest` errors carry, so both
        # alternatives are needed.
        REKOR_DUP_PATTERN='createLogEntryConflict|an equivalent entry already exists'

        # Transient backend failures that warrant a retry with backoff. The
        # keyless flow talks to Fulcio, Rekor and the OCI registry over HTTP/2,
        # and the public-good infrastructure intermittently aborts a stream
        # mid-request (e.g. `signing bundle: error signing bundle: stream error:
        # stream ID 1; INTERNAL_ERROR; received from peer`) or returns a
        # 5xx/timeout. These are unrelated to the artifact or our config, so a
        # fresh attempt almost always succeeds. Without this, a single flake on
        # any one of N per-arch signatures fails the whole publish job and forces
        # a manual rerun. Permanent errors (4xx auth/config, bad ref) are NOT
        # listed here on purpose, so they still fail fast.
        TRANSIENT_PATTERN='INTERNAL_ERROR|stream error|connection reset|connection refused|broken pipe'
        TRANSIENT_PATTERN+='|unexpected EOF|TLS handshake|i/o timeout|context deadline exceeded|timeout'
        TRANSIENT_PATTERN+='|408 |425 |429 |500 |502 |503 |504 |Service Unavailable|Bad Gateway|Gateway Time-?out|too many requests'

        # Attempts per cosign network call (1 initial try + up to 3 retries).
        MAX_ATTEMPTS=4

        # backoff <attempt> — exponential delay (5s, 10s, 20s, …) before retry.
        backoff() {
          local delay=$(( 5 * (2 ** ($1 - 1)) ))
          echo "    └─ retrying in ${delay}s …" >&2
          sleep "$delay"
        }

        # cosign_retry <label> <cmd…> — run a cosign network operation, retrying
        # ONLY transient backend errors (see TRANSIENT_PATTERN) with exponential
        # backoff. Output is captured rather than streamed so it can be
        # classified; on success it is discarded to keep happy-path logs quiet
        # (matching the previous behaviour). Exit status:
        #   0  success
        #   42 Rekor reports the entry already exists (caller decides to skip)
        #   1  permanent failure (captured output already printed to stderr)
        cosign_retry() {
          local label="$1"; shift
          local attempt out
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if out=$("$@" 2>&1); then
              return 0
            fi
            if printf '%s' "$out" | grep -Eq "$REKOR_DUP_PATTERN"; then
              return 42
            fi
            if printf '%s' "$out" | grep -Eq "$TRANSIENT_PATTERN" && [[ "$attempt" -lt "$MAX_ATTEMPTS" ]]; then
              echo "WARNING: ${label}: transient signing-backend error (attempt ${attempt}/${MAX_ATTEMPTS})" >&2
              printf '%s\n' "$out" | sed 's/^/    │ /' >&2
              backoff "$attempt"
              continue
            fi
            printf '%s\n' "$out" >&2
            return 1
          done
          return 1
        }

        case "<<parameters.kind>>" in
          oci)
            while IFS= read -r ref; do
              [[ -z "$ref" || "$ref" =~ ^# ]] && continue
              echo "cosign sign $ref"
              rc=0; cosign_retry "sign $ref" cosign sign --yes "$ref" || rc=$?
              if [[ "$rc" -eq 42 ]]; then
                echo "Rekor: entry already exists for $ref, skipping sign."
              elif [[ "$rc" -ne 0 ]]; then
                exit 1
              fi
              echo "cosign verify $ref"
              rc=0; cosign_retry "verify $ref" cosign verify \
                --certificate-oidc-issuer-regexp "$ISSUER_REGEX" \
                --certificate-identity-regexp "$IDENTITY_REGEX" \
                "$ref" || rc=$?
              [[ "$rc" -eq 0 ]] || exit 1
            done < "$refs_file"
            ;;
          blob)
            # Rekor can reject the upload with "an equivalent entry already
            # exists" (HTTP 409) when its client retries a POST that already
            # succeeded server-side. Unlike `oci`/`attest`, the duplicate cannot
            # be skipped: the bundle file is only written on success, and
            # verify-blob needs it. But sign-blob mints fresh ephemeral keys per
            # invocation — a retry produces a new, non-equivalent entry — so a
            # full re-run resolves the conflict. Transient backend errors are
            # retried the same way (with backoff); both share MAX_ATTEMPTS.
            while IFS=' ' read -r file bundle; do
              [[ -z "$file" || "$file" =~ ^# ]] && continue
              echo "cosign sign-blob $file → $bundle"
              for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
                rm -f "$bundle"
                if out=$(cosign sign-blob --yes --bundle "$bundle" "$file" 2>&1); then
                  break
                fi
                if [[ "$attempt" -ge "$MAX_ATTEMPTS" ]]; then
                  printf '%s\n' "$out" >&2; exit 1
                fi
                if printf '%s' "$out" | grep -Eq "$REKOR_DUP_PATTERN"; then
                  echo "Rekor: duplicate entry for $file (attempt ${attempt}/${MAX_ATTEMPTS}), retrying with fresh keys."
                elif printf '%s' "$out" | grep -Eq "$TRANSIENT_PATTERN"; then
                  echo "WARNING: sign-blob $file: transient signing-backend error (attempt ${attempt}/${MAX_ATTEMPTS})" >&2
                  printf '%s\n' "$out" | sed 's/^/    │ /' >&2
                  backoff "$attempt"
                else
                  printf '%s\n' "$out" >&2; exit 1
                fi
              done
              echo "cosign verify-blob $file"
              rc=0; cosign_retry "verify-blob $file" cosign verify-blob \
                --bundle "$bundle" \
                --certificate-oidc-issuer-regexp "$ISSUER_REGEX" \
                --certificate-identity-regexp "$IDENTITY_REGEX" \
                "$file" || rc=$?
              [[ "$rc" -eq 0 ]] || exit 1
            done < "$refs_file"
            ;;
          attest)
            # Large-SBOM dependency: real SBOM predicates routinely exceed public
            # Rekor's 100 KB attestation limit (the live app-operator SPDX is ~465 KB).
            # This only works because the pinned cosign writes new-format sigstore
            # bundles (v0.3), whose Rekor `dsse` entries upload hashes rather than the
            # full payload. If cosign ever defaults back to the legacy `intoto` upload
            # path (or `--new-bundle-format=false` is added), every large-SBOM build
            # starts failing here with a Rekor size-limit error.
            while IFS=' ' read -r ref type predicate; do
              [[ -z "$ref" || "$ref" =~ ^# ]] && continue
              echo "cosign attest --type $type $ref (predicate: $predicate)"
              rc=0; cosign_retry "attest $ref ($type)" \
                cosign attest --yes --type "$type" --predicate "$predicate" "$ref" || rc=$?
              if [[ "$rc" -eq 42 ]]; then
                echo "Rekor: entry already exists for $ref ($type), skipping attest."
              elif [[ "$rc" -ne 0 ]]; then
                exit 1
              fi
              echo "cosign verify-attestation --type $type $ref"
              rc=0; cosign_retry "verify-attestation $ref ($type)" cosign verify-attestation \
                --type "$type" \
                --certificate-oidc-issuer-regexp "$ISSUER_REGEX" \
                --certificate-identity-regexp "$IDENTITY_REGEX" \
                "$ref" || rc=$?
              [[ "$rc" -eq 0 ]] || exit 1
            done < "$refs_file"
            ;;
        esac
