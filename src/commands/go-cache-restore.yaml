steps:
  - run:
      name: Pin GOCACHE
      command: |
        echo "export GOCACHE=${HOME}/.cache/go-build" >> "$BASH_ENV"
  - restore_cache:
      name: Restore Go module cache
      keys:
        - go-build-go-mod-v1-{{ checksum "go.sum" }}
  - restore_cache:
      name: Restore Go build cache
      keys:
        - go-build-cache-v1-{{ checksum "go.sum" }}
