description: |
  Validate that the container image builds for every target platform, without
  pushing anything. The branch/PR counterpart of `push-to-registries`: it runs
  the same hadolint lint and the same multi-arch `docker buildx` build (with
  QEMU for foreign architectures), but the result stays in the BuildKit cache.
  No registry credentials, no signing, no SBOMs — nothing is published.

  Like `push-to-registries`, it attaches the workspace so Dockerfiles that
  `COPY` the binaries produced by `go-build` keep working; wire it with
  `requires: [go-build]`.
environment:
  DOCKER_BUILDKIT: "1"
executor: "architect"
resource_class: "<< parameters.resource_class >>"
parameters:
  image:
    description: Name used for the (discarded) local image tag. Defaults to `giantswarm/REPO_NAME`.
    type: string
    default: "giantswarm/${CIRCLE_PROJECT_REPONAME}"
  resource_class:
    default: small
    description: |
      Configures the amount of CPU and RAM for the job. See
      https://circleci.com/docs/2.0/configuration-reference/#docker-executor
      for details.
    type: enum
    enum: ["small", "medium", "medium+", "large", "xlarge"]
  build-context:
    type: string
    default: "."
  dockerfile:
    type: string
    default: "./Dockerfile"
  platforms:
    description: |
      Comma-separated list of platforms for the buildx build. When empty, the list is
      auto-derived from the `.platforms` file written by `go-build` to the workspace.
      Falls back to `linux/amd64,linux/arm64` if neither is available.
    type: string
    default: ""
  hadolint:
    description: |
      Lint the Dockerfile with hadolint before building.
      - "warn" (default): run hadolint, print findings, never fail the job.
      - "fail": run hadolint and fail the job on any finding.
      - "skip": don't run hadolint at all.
    type: enum
    enum: ["warn", "fail", "skip"]
    default: "warn"
  hadolint-config:
    description: |
      Optional path to a `.hadolint.yaml` configuration file. When empty,
      hadolint uses its built-in defaults.
    type: string
    default: ""
steps:
  - checkout
  - setup_remote_docker:
      version: default
  - attach_workspace:
      at: .
  - hadolint:
      mode: <<parameters.hadolint>>
      dockerfile: <<parameters.dockerfile>>
      config: <<parameters.hadolint-config>>
  - image-build:
      image: <<parameters.image>>
      build-context: <<parameters.build-context>>
      dockerfile: <<parameters.dockerfile>>
      platforms: <<parameters.platforms>>
