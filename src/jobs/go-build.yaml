description: |
  It does everything that go-test
  (https://circleci.com/orbs/registry/orb/giantswarm/architect#jobs-go-test)
  job does and runs `go build` against the codebase on top of that. It injects
  all the variables go-test job does into the produced binary.

  The job produces static binaries named `<binary>-<GOOS>-<GOARCH>` for each
  entry in `architectures`, persists them to the workspace, and writes the
  resolved architecture list to `.platforms` so downstream `push-to-registries`
  can auto-derive `--platform`.

parameters:
  binary:
    description: "Name of the binary produced by the job. It is also persisted to the workspace."
    type: "string"
  architectures:
    description: |
      Comma-separated list of target architectures to build (e.g.,
      "linux/amd64,linux/arm64"). The resolved list is written to `.platforms` in
      the workspace for downstream auto-discovery in `push-to-registries`.
    type: string
    default: "linux/amd64"
  path:
    default: "."
    description: |
      The path where the Go package to build is located.
    type: string
  pre_test_target:
    default: ""
    description: |
      Executes the requested Makefile target before lints and tests. Helpful to generate code in advance.
    type: string
  resource_class:
    default: "medium"
    description: |
        Configures amount CPU and RAM for the job. See
        https://circleci.com/docs/2.0/configuration-reference/#docker-executor
        for details.
    type: "enum"
    enum: ["small", "medium", "medium+", "large", "xlarge"]
  test_target:
    default: ""
    description: |
      Executes the requested Makefile target.
    type: string
  tags:
    default: ""
    description: |
      Additional tags to include in -tags flag of go build.
    type: string
  clone_depth:
    default: 1
    description: |
      Number of commits to include in the local git history after checkout.
      Use `0` for unlimited depth (unshallow). Values greater than `1` deepen
      the history to that many commits. The default of `1` preserves the
      current behaviour of CircleCI's built-in `checkout` step. Use `0` when
      build steps (e.g. `go generate`) rely on `git log` / `git rev-list` to
      find the last commit that touched a specific file.
    type: integer
executor: "architect"
resource_class: "<< parameters.resource_class >>"
steps:
  - checkout
  - unless:
      condition:
        equal: [1, << parameters.clone_depth >>]
      steps:
        - run:
            name: Adjust git clone depth
            command: |
              depth="<< parameters.clone_depth >>"
              if [[ "$depth" == "0" ]]; then
                git fetch --tags --unshallow 2>/dev/null || git fetch --tags
              else
                git fetch --tags --depth="$depth"
              fi
  - tools-info
  - go-cache-restore
  - go-build:
      binary: << parameters.binary >>
      path: << parameters.path >>
      pre_test_target: << parameters.pre_test_target >>
      tags: << parameters.tags >>
      test_target: << parameters.test_target >>
      architectures: << parameters.architectures >>
  - persist_to_workspace:
      root: .
      paths:
        - ./<< parameters.binary >>-*-*
        - ./.platforms
  # The bare `./<binary>` is the linux/amd64 copy and only exists when amd64 is
  # in the architectures list. Persist it conditionally to avoid a missing-path
  # error on lists that don't include amd64.
  - when:
      condition:
        matches: { pattern: ".*linux/amd64.*", value: << parameters.architectures >> }
      steps:
        - persist_to_workspace:
            root: .
            paths:
              - ./<< parameters.binary >>
  - go-cache-save
