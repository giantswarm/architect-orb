environment:
  DOCKER_BUILDKIT: "1"
executor: "architect"
resource_class: "<< parameters.resource_class >>"
parameters:
  image:
    description: Name of the  container repository and image. Defaults to `giantswarm/REPO_NAME`. Must not contain registry host name!
    type: string
    default: "giantswarm/${CIRCLE_PROJECT_REPONAME}"
  tag-latest-branch:
    description: 'Name of the branch on which the image will be additionally tagged as "latest".'
    type: string
    default: main
  resource_class:
    default: small
    description: |
      Configures the amount of CPU and RAM for the job. See
      https://circleci.com/docs/2.0/configuration-reference/#docker-executor
      for details.
    type: enum
    enum: ["small", "medium", "medium+", "large", "xlarge"]
  build-context:
    type: string
    default: "."
  dockerfile:
    type: string
    default: "./Dockerfile"
  git-tag-prefix:
    type: string
    default: ""
  tag-suffix:
    type: string
    default: ""
  force-public:
    description: Skip the repo visibility check and push the the image to public registries
    type: boolean
    default: false
  split-china-push:
    description: Use self-hosted CircleCI runner in China for pushing image to Aliyun.
    type: boolean
    default: false
  registries-data:
    default: ""
    type: string
  multiarch:
    description: |
      When true, use 'docker buildx build' to build and push a multi-architecture image.
      Set 'platforms' to specify target platforms.
      When false (default), use the classic 'docker build' single-arch path.
    type: boolean
    default: false
  platforms:
    description: |
      Comma-separated list of platforms for multi-arch image build (only used when
      multiarch: true). When empty, the list is auto-derived from the `.platforms` file
      written by `go-build` to the workspace. Falls back to `linux/amd64,linux/arm64` if
      neither is available.
    type: string
    default: ""
  annotations:
    description: |
      Newline-separated OCI annotations passed to 'docker buildx build --annotation'.
      Each line uses the buildx format '[type:]key=value'. For multi-arch builds:
        manifest:key=value            - annotates each platform manifest
        index:key=value               - annotates the manifest list (OCI index)
        manifest-descriptor:key=value - annotates descriptors in the index
        key=value (no prefix)         - defaults to index for multi-platform builds
      Only used when multiarch: true.
    type: string
    default: ""
  oci-labels:
    description: |
      Emit standard OCI image labels (and matching index annotations in multi-arch mode):
      org.opencontainers.image.{source,revision,version,created}.
    type: boolean
    default: true
  provenance:
    description: |
      Buildx SLSA provenance attestation mode: "min" (default), "max", or "false".
      Stored as OCI 1.1 referrer artifacts where the registry supports them, otherwise
      inlined. Currently effective only on the multi-arch path (v8.x); single-arch picks
      this up automatically when v9 collapses to a single buildx path.
    type: enum
    enum: ["min", "max", "false"]
    default: "min"
  sbom:
    description: |
      Generate and attach an SPDX SBOM attestation per platform. Currently effective only
      on the multi-arch path (v8.x).
    type: boolean
    default: true
  sign:
    description: |
      Sign the pushed image with cosign keyless OIDC. Public images only — private
      images are skipped at runtime to avoid leaking digests/timestamps into the public
      Rekor transparency log. Mints a fresh CircleCI OIDC token with
      audience=sigstore via `circleci run oidc get`. Currently effective only on the
      multi-arch path (v8.x).
    type: boolean
    default: true
  hadolint:
    description: |
      Lint the Dockerfile with hadolint before building.
      - "warn" (default): run hadolint, print findings, never fail the job.
      - "fail": run hadolint and fail the job on any finding.
      - "skip": don't run hadolint at all.
    type: enum
    enum: ["warn", "fail", "skip"]
    default: "warn"
  hadolint-config:
    description: |
      Optional path to a `.hadolint.yaml` configuration file. When empty,
      hadolint uses its built-in defaults.
    type: string
    default: ""
steps:
  - checkout
  - setup_remote_docker:
      version: default
  - attach_workspace:
      at: .
  - run:
      name: Set git tag prefix (empty if not set, only used on mono repos)
      command: echo 'export GS_GIT_TAG_PREFIX="<<parameters.git-tag-prefix>>"' >> "$BASH_ENV"
  - image-prepare-tag:
      tag-suffix: <<parameters.tag-suffix>>
  - unless:
      condition:
        equal: ["<<parameters.hadolint>>", "skip"]
      steps:
        - run:
            name: "hadolint: lint <<parameters.dockerfile>>"
            command: |
              set -uo pipefail
              if ! command -v hadolint >/dev/null 2>&1; then
                echo "hadolint not found on PATH; the architect image should provide it." >&2
                if [[ "<<parameters.hadolint>>" == "fail" ]]; then exit 1; fi
                exit 0
              fi
              args=()
              if [[ -n "<<parameters.hadolint-config>>" ]]; then
                args+=("--config" "<<parameters.hadolint-config>>")
              fi
              if hadolint "${args[@]}" "<<parameters.dockerfile>>"; then
                echo "hadolint: no findings."
                exit 0
              fi
              rc=$?
              if [[ "<<parameters.hadolint>>" == "fail" ]]; then
                exit "$rc"
              fi
              echo "hadolint reported findings (mode=warn); continuing build."
  - image-login-to-registries:
      registries-data: <<parameters.registries-data>>
  - unless:
      condition: <<parameters.multiarch>>
      steps:
        - image-build-with-docker:
            build-context: <<parameters.build-context>>
            dockerfile: <<parameters.dockerfile>>
            oci-labels: <<parameters.oci-labels>>
        - image-push-to-registries:
            image-sha256_envvar: DOCKER_IMAGE_SHA256
            image: <<parameters.image>>
            tag_envvar: DOCKER_IMAGE_TAG
            build-context: <<parameters.build-context>>
            dockerfile: <<parameters.dockerfile>>
            force-public: <<parameters.force-public>>
            tag-latest-branch: <<parameters.tag-latest-branch>>
            tag-suffix: <<parameters.tag-suffix>>
            split-china-push: <<parameters.split-china-push>>
            registries-data:
              <<parameters.registries-data>>
              # 2025.11.03 Current config in the REGISTRIES_DATA_BASE64 env var
              #        private gsociprivate.azurecr.io ACR_GSOCIPRIVATE_USERNAME ACR_GSOCIPRIVATE_PASSWORD true
              #        public gsoci.azurecr.io ACR_GSOCI_USERNAME ACR_GSOCI_PASSWORD true
              #        public giantswarm-registry.cn-shanghai.cr.aliyuncs.com ALIYUN_USERNAME ALIYUN_PASSWORD false
  - when:
      condition: <<parameters.multiarch>>
      steps:
        - run:
            name: Validate platforms parameter
            command: |
              if [ -n "<<parameters.platforms>>" ] && [[ ! "<<parameters.platforms>>" =~ ^[a-zA-Z0-9/_,-]+$ ]]; then
                echo "ERROR: The 'platforms' parameter, if set, must be a comma-separated list of valid platform strings (e.g., linux/amd64,linux/arm64)."
                exit 1
              fi
        - image-build-and-push-multiarch:
            image: <<parameters.image>>
            build-context: <<parameters.build-context>>
            dockerfile: <<parameters.dockerfile>>
            force-public: <<parameters.force-public>>
            tag-latest-branch: <<parameters.tag-latest-branch>>
            tag-suffix: <<parameters.tag-suffix>>
            registries-data: <<parameters.registries-data>>
            platforms: <<parameters.platforms>>
            annotations: <<parameters.annotations>>
            oci-labels: <<parameters.oci-labels>>
            provenance: <<parameters.provenance>>
            sbom: <<parameters.sbom>>
            sign: <<parameters.sign>>
            split-china-push: <<parameters.split-china-push>>
  - when:
      condition: <<parameters.split-china-push>>
      steps:
        - save_cache:
            key: image-data-{{.Environment.CIRCLE_PIPELINE_ID}}
            paths:
              - /tmp/.docker_image_registry
              - /tmp/.docker_image_tag
