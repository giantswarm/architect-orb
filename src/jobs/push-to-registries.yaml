environment:
  DOCKER_BUILDKIT: "1"
executor: "architect"
resource_class: "<< parameters.resource_class >>"
parameters:
  image:
    description:
      Name of the  container repository and image. Defaults to `giantswarm/REPO_NAME`. Must not contain
      registry host name!
    type: string
    default: "giantswarm/${CIRCLE_PROJECT_REPONAME}"
  tag-latest-branch:
    description: 'Name of the branch on which the image will be additionally tagged as "latest".'
    type: string
    default: main
  resource_class:
    default: small
    description: |
      Configures the amount of CPU and RAM for the job. See
      https://circleci.com/docs/2.0/configuration-reference/#docker-executor
      for details.
    type: enum
    enum: ["small", "medium", "medium+", "large", "xlarge"]
  build-context:
    type: string
    default: "."
  dockerfile:
    type: string
    default: "./Dockerfile"
  git-tag-prefix:
    type: string
    default: ""
  tag-suffix:
    type: string
    default: ""
  force-public:
    description: Skip the repo visibility check and push the the image to public registries
    type: boolean
    default: false
  registries-data:
    default: ""
    type: string
  slow-registries:
    type: string
    default: ""
    description: |
      Space-separated list of registry hostnames to push asynchronously via a separate pipeline,
      so they do not block downstream jobs. Only used when async-slow-registries is true.
      If empty, the SLOW_REGISTRIES environment variable is used instead.
  async-slow-registries:
    type: boolean
    default: true
    description: |
      When true (default), registries listed in slow-registries are skipped in this job and pushed
      asynchronously via the slow-registry-pusher pipeline.
      When false, all registries are pushed synchronously in this job (original behaviour).
steps:
  - checkout
  - setup_remote_docker:
      version: default
  - attach_workspace:
      at: .
  - run:
      name: Set git tag prefix (empty if not set, only used on mono repos)
      command: echo 'export GS_GIT_TAG_PREFIX="<<parameters.git-tag-prefix>>"' >> "$BASH_ENV"
  - image-prepare-tag:
      tag-suffix: <<parameters.tag-suffix>>
  - image-login-to-registries:
      registries-data: <<parameters.registries-data>>
  - image-build-with-docker:
      build-context: <<parameters.build-context>>
      dockerfile: <<parameters.dockerfile>>
  - image-push-to-registries:
      image-sha256_envvar: DOCKER_IMAGE_SHA256
      image: <<parameters.image>>
      tag_envvar: DOCKER_IMAGE_TAG
      build-context: <<parameters.build-context>>
      dockerfile: <<parameters.dockerfile>>
      force-public: <<parameters.force-public>>
      tag-latest-branch: <<parameters.tag-latest-branch>>
      tag-suffix: <<parameters.tag-suffix>>
      slow-registries: <<parameters.slow-registries>>
      async-slow-registries: <<parameters.async-slow-registries>>
      registries-data:
        <<parameters.registries-data>>
        # Current config in the REGISTRIES_DATA_BASE64 env var
        #        value saved in 1password
  - when:
      condition: <<parameters.async-slow-registries>>
      steps:
        - trigger-slow-registry-push:
            image: <<parameters.image>>
            tag_envvar: DOCKER_IMAGE_TAG
            slow-registries: <<parameters.slow-registries>>
            force-public: <<parameters.force-public>>
            tag-latest-branch: <<parameters.tag-latest-branch>>
            tag-suffix: <<parameters.tag-suffix>>
