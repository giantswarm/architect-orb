parameters:
  app_catalog:
    description:
      "Name of the Github repository inside giantswarm organization hosting the App Catalog for tagged builds."
    type: "string"
  app_catalog_test:
    description:
      "Name of the Github repository inside giantswarm organization hosting the App Catalog for test builds."
    type: "string"
  attach_workspace:
    description: "If true, the previously persisted workspace will be attached after checkout."
    type: "boolean"
    default: false
  chart:
    description: "Name of the chart inside helm directory to push to the App Catalog."
    type: "string"
  explicit_allow_chart_name_mismatch:
    type: boolean
    default: false
    description: |
      If 'explicit_allow_chart_name_mismatch' is set to true, the name of the chart can be anything.
      Otherwise the name set in the 'chart' parameter must start with the repository name and optionally continue with '-app'.
  ct_config:
    description: "Chart Testing Config file path"
    type: "string"
    default: ""
  on_tag:
    type: boolean
    default: true
    description: |
      When this is `false`, commits to `master` will be pushed to `app_catalog` instead of `app_catalog_test`.
      Set this to `false` for deployments that follow a a master branch for production releases rather than
      using tags (the default).
  executor:
    type: "enum"
    enum: ["app-build-suite"]
    default: "app-build-suite"
    description: |
      Kept for backwards compatibility. Only `app-build-suite` is accepted.
      Will be removed in a future version.
  push_to_appcatalog:
    default: true
    description: |
      Push the chart to App Catalog git repository if this is `true`.
    type: boolean
  push_to_oci_registry:
    default: true
    description: |
      Push the chart to OCI registry if this is `true`.
    type: boolean
  force-public:
    description: Skip the repo visibility check and push the the chart to public registry
    type: boolean
    default: false
  sign:
    description: |
      Sign the published Helm chart with cosign keyless OIDC. Public charts only —
      private charts are skipped at runtime to avoid leaking digests/timestamps
      into the public Rekor transparency log. Requires `CIRCLE_OIDC_TOKEN_V2` in
      the job's CircleCI context (auto-injected for context-bound jobs).
    type: boolean
    default: true
  resource_class:
    default: "small"
    description: |
      Configures amount CPU and RAM for the job. See
      https://circleci.com/docs/2.0/configuration-reference/#docker-executor
      for details.
    type: "enum"
    enum: ["small", "medium", "medium+", "large", "xlarge"]
  skip_conftest_deprek8ion:
    type: boolean
    default: false
    description: |
      This parameter has no effect anymore, it is kept for backwards compatibility.
      Will be removed in a future version.
  override_chart_version:
    type: boolean
    default: true
    description: |
      When `true` (the default), passes `--override-chart-version` to App Build Suite,
      stamping the chart version with the value from `gitsemver` (or `.build_version`
      workspace file).  Set to `false` to leave the version in `Chart.yaml` unchanged.
  override_app_version:
    type: boolean
    default: true
    description: |
      When `true` (the default), passes `--override-app-version` to App Build Suite,
      stamping the app version with the value from `gitsemver` (or `.build_version`
      workspace file).  Set to `false` to leave the appVersion in `Chart.yaml` unchanged.
  persist_chart_archive:
    type: boolean
    default: false
    description: |
      When this is `true`, the packaged chart archive will be persisted to the workspace.
      Set this to `true`, if you're planning to execute tests using app-test-suite.
executor: "<< parameters.executor >>"
resource_class: "<< parameters.resource_class >>"
steps:
  - unless:
      condition: << parameters.explicit_allow_chart_name_mismatch >>
      steps:
        - run:
            name: "architect/push-to-app-catalog: Verify chart name"
            command: |
              CHART_NAME="<< parameters.chart >>"
              if [[ ${CHART_NAME%-app} == ${CIRCLE_PROJECT_REPONAME%-app} ]]; then exit 0; fi
              echo "chart parameter value should match ${CIRCLE_PROJECT_REPONAME%-app} or ${CIRCLE_PROJECT_REPONAME%-app}-app"
              exit 1
  - checkout
  - tools-info:
      show_architect_version: false
      show_go_version: false
      show_abs_version: true
  - determine-catalog-name:
      app_catalog: << parameters.app_catalog >>
      app_catalog_test: << parameters.app_catalog_test >>
      on_tag: << parameters.on_tag >>
  - when:
      condition: << parameters.attach_workspace >>
      steps:
        - attach_workspace:
            at: .
  - package-helm-with-abs:
      chart: << parameters.chart >>
      override_chart_version: << parameters.override_chart_version >>
      override_app_version: << parameters.override_app_version >>
  - push-helm:
      push_to_appcatalog: << parameters.push_to_appcatalog >>
      push_to_oci_registry: << parameters.push_to_oci_registry >>
      force-public: <<parameters.force-public>>
      sign: << parameters.sign >>
      chart: << parameters.chart >>
  - when:
      condition: << parameters.persist_chart_archive >>
      steps:
        - persist_to_workspace:
            root: build
            paths:
              - "<< parameters.chart >>*.tgz"
